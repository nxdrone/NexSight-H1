[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
  lvgl/lvgl@^8.3.11
  bodmer/TFT_eSPI@^2.5.43
build_flags =
  -D LV_CONF_INCLUDE_SIMPLE
  -D USER_SETUP_LOADED
  -D ILI9341_DRIVER
  -D TFT_WIDTH=320
  -D TFT_HEIGHT=240
  -D TFT_MOSI=11
  -D TFT_SCLK=12
  -D TFT_CS=10
  -D TFT_DC=9
  -D TFT_RST=8
  -D TFT_BL=13
  -D SPI_FREQUENCY=40000000
